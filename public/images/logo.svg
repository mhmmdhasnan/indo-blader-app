<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <path id="topArc"    d="M 45,200 A 155,155 0 0,1 355,200"/>
    <path id="bottomArc" d="M 58,230 A 148,148 0 0,0 342,230"/>
  </defs>

  <!-- Background fill -->
  <circle cx="200" cy="200" r="195" fill="#0f0f0f"/>

  <!-- Outer border ring -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="#f0ede4" stroke-width="5"/>
  <!-- Second ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#f0ede4" stroke-width="1.5"/>
  <!-- Inner border ring -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="#f0ede4" stroke-width="3"/>

  <!-- INDO BLADER arched top text -->
  <text font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="30" fill="#f0ede4" letter-spacing="8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">INDO BLADER</textPath>
  </text>

  <!-- ONE WHEEL ONE FAMILY arched bottom text -->
  <text font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="16" fill="#f0ede4" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">ONE WHEEL ONE FAMILY</textPath>
  </text>

  <!-- Left star -->
  <text x="60" y="214" font-size="20" fill="#f0ede4" text-anchor="middle">★</text>
  <!-- Right star -->
  <text x="340" y="214" font-size="20" fill="#f0ede4" text-anchor="middle">★</text>

  <!-- Year 20 left -->
  <text x="98" y="215" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="20" fill="#f0ede4" text-anchor="middle">20</text>
  <!-- Year 20 right -->
  <text x="302" y="215" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="20" fill="#f0ede4" text-anchor="middle">20</text>

  <!-- Horizontal divider lines beside years -->
  <line x1="113" y1="207" x2="148" y2="207" stroke="#f0ede4" stroke-width="1.5"/>
  <line x1="252" y1="207" x2="287" y2="207" stroke="#f0ede4" stroke-width="1.5"/>

  <!-- Globe circle -->
  <circle cx="200" cy="207" r="56" fill="none" stroke="#f0ede4" stroke-width="2"/>

  <!-- Globe latitude lines -->
  <ellipse cx="200" cy="207" rx="56" ry="22" fill="none" stroke="#f0ede4" stroke-width="1.2"/>
  <!-- Globe longitude ellipse -->
  <ellipse cx="200" cy="207" rx="28" ry="56" fill="none" stroke="#f0ede4" stroke-width="1.2"/>
  <!-- Vertical center -->
  <line x1="200" y1="151" x2="200" y2="263" stroke="#f0ede4" stroke-width="1.2"/>
  <!-- Horizontal center -->
  <line x1="144" y1="207" x2="256" y2="207" stroke="#f0ede4" stroke-width="1.2"/>

  <!-- IB monogram box (covers globe center) -->
  <rect x="166" y="183" width="68" height="48" fill="#0f0f0f" rx="2"/>

  <!-- I and B letters -->
  <text x="191" y="221" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="36" fill="#f0ede4" text-anchor="middle">I</text>
  <text x="214" y="221" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="36" fill="#f0ede4" text-anchor="middle">B</text>

  <!-- Top dot -->
  <circle cx="200" cy="10" r="4" fill="#f0ede4"/>
  <!-- Bottom dot -->
  <circle cx="200" cy="390" r="4" fill="#f0ede4"/>
</svg>
